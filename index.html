<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main">
        <h1>Local Storage</h1>

        <input type="text" id="userkey" placeholder="Enter title (key)">
        <input type="text" id="userdata" placeholder="Enter username">

        <button onclick="addData()">Add</button>

        <br><br>
        
        <div id="returndata">
            <input type="text" id="usersearch" placeholder="Search key">

            <button onclick="getData()">Search</button>

            <button onclick="deleteData()">Delete All</button>
        </div>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
